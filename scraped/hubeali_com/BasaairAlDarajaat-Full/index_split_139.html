<p dir="rtl" class="block_15">9 باب في الأئمة ع أنه جرى لهم ما جرى لرسول الله و أنهم أمناء الله على خلقه و أركان الأرض و أمناء الله على ما هبط من علم أو عذر أو نذر و الحجة البالغة على ما في الأرض و أنهم قد أعطوا علم المنايا و البلايا و الوصايا و فصل الخطاب و العصا و الميسم‏</p>
