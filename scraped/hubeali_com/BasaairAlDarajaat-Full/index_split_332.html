<p dir="rtl" class="block_42"><span class="text_14">19 باب في الروح التي قال الله عز و جل‏</span><span class="text_15"> يُنَزِّلُ الْمَلائِكَةَ بِالرُّوحِ مِنْ أَمْرِهِ‏</span><span class="text_14"> و هي تكون مع الأنبياء و الأوصياء و الفرق بين الروح و الملائكة</span></p>
